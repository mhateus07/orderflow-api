version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: orderflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orderflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: orderflow-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/orderflow
      JWT_SECRET: change-me-in-production
      COOKIE_SECRET: change-me-in-production
      PORT: 3333
      NODE_ENV: production
    ports:
      - "3333:3333"

volumes:
  postgres_data:
